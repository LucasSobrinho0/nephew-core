<div class="border-top mt-4 pt-4">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
    <div>
      <span class="section-kicker">Variáveis do template</span>
      <h3 class="h5 mb-0">Copie e cole nos campos abaixo</h3>
    </div>
    <span class="small text-body-secondary">Clique em uma variável para copiar o placeholder.</span>
  </div>

  <div class="row g-2">
    {% for variable in gmail_template_variables %}
      <div class="col-12">
        <button
          type="button"
          class="btn btn-outline-secondary w-100 text-start d-flex flex-wrap justify-content-between align-items-center gap-3"
          data-copy-text="{{ variable.token }}"
        >
          <span class="d-inline-flex align-items-center gap-2">
            <span class="code-pill">{{ variable.token }}</span>
            <span>{{ variable.label }}</span>
          </span>
          <span class="small text-body-secondary">{{ variable.description }}</span>
        </button>
        <div class="form-text mt-1">{{ variable.example }}</div>
      </div>
    {% endfor %}
  </div>
</div>
