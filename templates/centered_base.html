{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Configuração Inicial{% endblock %} | Alow Smart Flow</title>
    <script>
      (function () {
        var savedTheme = localStorage.getItem('nephewcrm-theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
      }());
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
  </head>
  <body class="centered-shell">
    <button type="button" class="icon-button auth-theme-toggle" data-theme-toggle aria-label="Alternar tema de cores">
      <i class="bi bi-moon-stars-fill"></i>
    </button>

    <main class="container py-5">
      {% include 'partials/messages.html' %}
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
