<div class="modal fade" id="crmErrorModal" tabindex="-1" aria-labelledby="crmErrorModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-surface">
      <div class="modal-header border-0 pb-0">
        <div>
          <span class="section-kicker">Erro</span>
          <h2 class="modal-title h4 mb-0" id="crmErrorModalLabel">Nao foi possivel concluir a operacao</h2>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body pt-3">
        <p class="mb-0" id="crmErrorModalMessage">Ocorreu um erro inesperado.</p>
        <div class="alert alert-danger mt-3 mb-0 d-none" id="crmErrorModalDetails"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
