<div class="modal fade" id="{{ modal_id }}" tabindex="-1" aria-labelledby="{{ modal_id }}Label" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-surface">
      <div class="modal-header border-0 pb-0">
        <div>
          <span class="section-kicker">{{ modal_kicker }}</span>
          <h2 class="modal-title h4 mb-0" id="{{ modal_id }}Label">{{ modal_title }}</h2>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body pt-3">
        <p class="mb-3">{{ modal_message }}</p>
        {% if modal_warning %}
          <div class="alert alert-warning mb-0" role="alert">{{ modal_warning }}</div>
        {% endif %}
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ modal_cancel_label }}</button>
        <a href="{{ modal_confirm_url }}" class="btn btn-brand">{{ modal_confirm_label }}</a>
      </div>
    </div>
  </div>
</div>
